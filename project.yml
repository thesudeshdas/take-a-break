name: TakeABreak
options:
  bundleIdPrefix: com.sudeshdas
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

targets:
  TakeABreak:
    type: application
    platform: macOS
    sources:
      - path: TakeABreak
        excludes:
          - "Resources/Sounds/**"
          - Info.plist
    resources:
      - path: TakeABreak/Resources/Assets.xcassets
    info:
      path: TakeABreak/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Take a Break
        CFBundleName: TakeABreak
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "Take a Break checks if your camera is in use to automatically pause break reminders during video calls."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sudeshdas.TakeABreak
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: TakeABreak/TakeABreak.entitlements
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
